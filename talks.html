  .talk:last-child{border-bottom:none;}
  .talk .what{color:var(--ink);}
  .talk .what .place{color:var(--muted);}
  .talk .plenary{color:var(--accent);font-weight:600;font-size:.78rem;margin-left:6px;}
  .talk .when{color:var(--faint);font-size:.85rem;white-space:nowrap;text-align:right;}

  footer{border-top:1px solid var(--line);padding:26px 0 46px;color:var(--muted);font-size:.88rem;margin-top:30px;}
  footer a{color:var(--muted);}

  @media (max-width:560px){
    header.head h1{font-size:1.7rem;}

<script>
